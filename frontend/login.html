<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Ingreso | Sistema de Ahorro para Viviendas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css?v=20260325-1" />
</head>

<body class="login-page">
  <div class="bg-shape bg-shape-a"></div>
  <div class="bg-shape bg-shape-b"></div>

  <section class="panel login-card">
    <p class="eyebrow">Acceso interno</p>
    <h1 class="login-title">Ingresar al sistema</h1>
    <p class="login-subtitle">Usá tu usuario del estudio para entrar al panel de gestión.</p>

    <form id="login-form" class="inline-form">
      <input type="text" name="username" placeholder="Usuario" required />
      <input type="password" name="password" placeholder="Contraseña" required />
      <button class="btn btn-primary" type="submit">Iniciar sesión</button>
    </form>

    <pre id="login-error" class="system-log hidden"></pre>
  </section>

  <script type="module" src="./scripts/login.js?v=20260325-1"></script>
</body>

</html>
